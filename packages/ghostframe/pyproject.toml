[project]
name = "ghostframe"
version = "0.1.0"
description = "Multi-frame variant impact scanner — core scientific library"
authors = [
    { name = "Joseph" },
    { name = "Melaku" },
    { name = "Joshua" },
]
requires-python = ">=3.13"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    "mhcflurry>=2.2.0rc1",
    "pyfaidx>=0.8",
]

[project.scripts]
orfs = "ghostframe.cli.orfs:main"
ghostframe = "ghostframe.cli.main:cli"

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"
