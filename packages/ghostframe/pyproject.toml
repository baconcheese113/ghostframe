[project]
name = "ghostframe"
version = "1.1.0"
description = "Multi-frame variant impact scanner — core scientific library"
authors = [
    { name = "Joseph" },
    { name = "Melaku" },
    { name = "Joshua" },
]
requires-python = ">=3.13"
dependencies = [
    "cachetools>=5.3",
    "click>=8.1",
    "httpx>=0.27",
    "pandas>=2.0",
    "pyfaidx>=0.8",
]

[project.optional-dependencies]
mhc = ["mhcflurry>=2.2.0rc1"]

[project.scripts]
orfs = "ghostframe.cli.orfs:main"
ghostframe = "ghostframe.cli.main:cli"

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"
