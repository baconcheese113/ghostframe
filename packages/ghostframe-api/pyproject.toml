[project]
name = "ghostframe-api"
version = "0.1.0"
description = "GhostFrame FastAPI web backend"
authors = [
    { name = "Joseph" },
    { name = "Melaku" },
    { name = "Joshua" },
]
requires-python = ">=3.13"
dependencies = [
    "ghostframe[mhc]",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "tenacity>=8.2",
]

[tool.uv.sources]
ghostframe = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"
