name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Migrate large files to LFS for HF
        run: |
          git lfs install
          git lfs migrate import --include="*.zip" --include-ref=refs/heads/master

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/baconcheese113/ghostframe
          git push hf master --force
          git lfs push hf master --all
